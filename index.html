<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kho Tài Liệu</title>
  <link rel="stylesheet" href="style.css?v=16" />
  <link rel="stylesheet" href="laptop.css?v=8" media="screen and (min-width: 769px)" />
  <link rel="stylesheet" href="mobile.css?v=13" media="screen and (max-width: 768px)" />
  <link rel="stylesheet" href="animation.css?v=5" />
</head>
<body>
  <header class="topbar">
    <div class="logo">📚 Kho Tài Liệu</div>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Tìm tài liệu theo tên hoặc file..." />
    </div>

    <div class="site-stats" aria-label="Số người truy cập website">
      <span id="siteVisitorCount">0 người truy cập</span>
    </div>
  </header>

  <section class="hero">
    <div class="hero-box">
      <h1>Chia sẻ và xem tài liệu dễ dàng</h1>
      <p>Kho tài liệu học tập với nhiều file PDF và Word. Tìm nhanh, lọc nhanh, xem nhanh.</p>
    </div>
  </section>

  <main class="layout">
    <section class="content">
      <div class="content-head">
        <h2>Danh sách tài liệu</h2>
        <p id="resultCount">0 tài liệu</p>
      </div>

      <div class="document-grid" id="documentGrid"></div>

      <div class="pagination" id="pagination"></div>
    </section>
  </main>

  <div class="modal" id="previewModal">
    <div class="modal-box">
      <button class="close-modal" id="closeModal">&times;</button>
      <div class="preview-icon" id="modalIcon">📄</div>
      <h3 id="modalTitle">Tên tài liệu</h3>
      <div class="preview-meta">
        <span id="modalSize">2.4 MB</span>
      </div>
      <div id="modalDesc" class="modal-desc"></div>
    </div>
  </div>

  <footer class="footer">
    <div>© 2026 Kho Tài Liệu</div>
    <div>Liên hệ | Giới thiệu | Điều khoản</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>
  <script src="script.js?v=19"></script>
</body>
</html>
