services:
  - type: web
    name: kho-tai-lieu
    runtime: node
    plan: free
    region: singapore
    branch: master
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: kho_tai_lieu
      - key: VISITOR_HASH_SALT
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"
